<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>♥️ Heart Animation</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    canvas {
        display: block;
        filter: drop-shadow(0 0 10px red) drop-shadow(0 0 20px pink);
    }
    #msg {
        position: absolute;
        top: 50%;
        width: 100%;
        text-align: center;
        transform: translateY(-50%);
        font-size: 40px;
        color: white;
        opacity: 0;
        transition: 1s;
    }
    #msg button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background: red;
        color: white;
    }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="msg">
   افرح ياعم مروان بيحبك😘 ❤️<br>
    <button onclick="restart()">Try Again</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];
let lines = [];
let index = 0;
let speed = 0.5;
let growing = true;
let finished = false;
let hue = 0;
let startTime = null; // لتحديد الوقت

// توليد نقاط القلب
function generateHeart(scale) {
    const pts = [];
    for (let i = 0; i < 10000; i++) {
        const t = i * Math.PI * 2 / 10000;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t)
                - 5 * Math.cos(2*t)
                - 2 * Math.cos(3*t)
                - Math.cos(4*t);
        pts.push([x * scale, -y * scale]);
    }
    return pts;
}

// تجهيز الخطوط
function prepareLines() {
    lines = [];
    for (let i = 0; i < points.length; i++) {
        for (let j = i; j < points.length; j += 10) {
            lines.push([points[i], points[j]]);
        }
    }
}

// إعادة التعيين
function reset() {
    points = generateHeart(12);
    prepareLines();
    index = 0;
    speed = 0.5;
    finished = false;
    hue = 0;
    startTime = performance.now();
    document.getElementById("msg").style.opacity = 0;
}

// رسم القلب
function draw(currentTime) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;

    for (let i = 0; i < index && i < lines.length; i++) {
        const [p1, p2] = lines[i];
        ctx.beginPath();
        ctx.moveTo(canvas.width/2 + p1[0], canvas.height/2 + p1[1]);
        ctx.lineTo(canvas.width/2 + p2[0], canvas.height/2 + p2[1]);
        ctx.stroke();
    }

    hue += 0.5;
    if (hue > 360) hue = 0;

    // نحدد إذا الوقت وصل 20 ثانية
    if (!finished && currentTime - startTime >= 20000) {
        finished = true;
        document.getElementById("msg").style.opacity = 1;
    }

    if (!finished) {
        if (growing) {
            speed += 0.05;
            if (speed > 5) growing = false;
        } else {
            speed -= 0.002;
        }

        index += speed;
    } else {
        // بعد الانتهاء أو مرور 20 ثانية
        document.getElementById("msg").style.opacity = 1;
    }

    requestAnimationFrame(draw);
}

// زرار Try Again
function restart() {
    reset();
}

// البداية
reset();
requestAnimationFrame(draw);
</script>

</body>
</html>
